name: Build native library of imgui-java for Linux

on:
  push:
    tags:
      - "mtt-imgui-java-natives-all-*"
      - "mtt-imgui-java-natives-linux-*"

jobs:
  build:
    name: Build native library of imgui-java for Linux
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: Misc/imgui-java
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install gcc and g++
        run: |
          sudo apt update
          sudo apt install gcc g++
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - name: Build lib-imgui-java
        run: ./buildSrc/scripts/build.sh linux
      - name: Publish build artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: /tmp/imgui/dst/libimgui-java64.so
