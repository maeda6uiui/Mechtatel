name: Release mechtatel-hello

on:
  push:
    tags:
      - "mechtatel-hello-*"

jobs:
  release:
    strategy:
      matrix:
        include:
          - name: Linux x64
            mvnProfile: mechtatel-natives-linux-x64
            archiveFilename: mechtatel-hello_linux_x64.tar.gz
            jarFilename: mechtatel-hello_linux_x64.jar
            openJdkUrl: https://download.java.net/java/GA/jdk26.0.1/458fda22e4c54d5ba572ab8d2b22eb83/8/GPL/openjdk-26.0.1_linux-x64_bin.tar.gz
          - name: Linux arm64
            mvnProfile: mechtatel-natives-linux-aarch64
            archiveFilename: mechtatel-hello_linux_arm64.tar.gz
            jarFilename: mechtatel-hello_linux_arm64.jar
            openJdkUrl: https://download.java.net/java/GA/jdk26.0.1/458fda22e4c54d5ba572ab8d2b22eb83/8/GPL/openjdk-26.0.1_linux-aarch64_bin.tar.gz
          - name: Windows x64
            mvnProfile: mechtatel-natives-windows-x64
            archiveFilename: mechtatel-hello_windows_x64.zip
            jarFilename: mechtatel-hello_windows_x64.jar
            openJdkUrl: https://download.java.net/java/GA/jdk26.0.1/458fda22e4c54d5ba572ab8d2b22eb83/8/GPL/openjdk-26.0.1_windows-x64_bin.zip
          - name: macOS arm64
            mvnProfile: mechtatel-natives-macos-aarch64
            archiveFilename: mechtatel-hello_macos_arm64.tar.gz
            jarFilename: mechtatel-hello_macos_arm64.jar
            openJdkUrl: https://download.java.net/java/GA/jdk26.0.1/458fda22e4c54d5ba572ab8d2b22eb83/8/GPL/openjdk-26.0.1_macos-aarch64_bin.tar.gz
    name: Release mechtatel-hello for ${{matrix.name}}
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
      - name: Create an uber JAR
        working-directory: Misc/mechtatel-hello
        run: mvn -B -ntp clean package -P ${{matrix.mvnProfile}}
      - name: Set tag name (${{github.ref_name}}) to README.md
        working-directory: Misc/mechtatel-hello
        run: sed -i "s/\${releaseTag}/${{github.ref_name}}/" README.md
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Create release artifacts
        working-directory: Misc/release-creator
        run: |
          uv run main.py \
              -p ../mechtatel-hello \
              -d mechtatel-hello \
              -oa ${{matrix.archiveFilename}} \
              -oj ${{matrix.jarFilename}} \
              --remove-package-dir-on-exit \
              -u ${{matrix.openJdkUrl}} \
              -f Data README.md LICENSE.txt
      - name: Publish artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Misc/release-creator/WorkingDir/${{matrix.archiveFilename}}
            Misc/release-creator/WorkingDir/${{matrix.jarFilename}}
  uploadData:
    name: Upload an archive file of Data directory
    needs: release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Misc/mechtatel-hello
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Create an archive file of Data directory
        run: zip -r data.zip Data
      - name: Publish data.zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: Misc/mechtatel-hello/data.zip
